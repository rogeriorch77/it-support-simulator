<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Support Simulator — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="logo-icon">IT</div>
      <h1 data-i18n="login_title">Connexion à la plateforme</h1>
      <p data-i18n="login_subtitle">Entrez vos identifiants pour accéder à la simulation</p>

      <form id="loginForm">
        <div class="form-group">
          <label data-i18n="username">Nom d'utilisateur</label>
          <input type="text" id="username" data-i18n="username" required>
        </div>
        <div class="form-group">
          <label data-i18n="password">Mot de passe</label>
          <input type="password" id="password" data-i18n="password" required>
        </div>
        <button type="submit" class="btn btn-primary" data-i18n="login_btn">Se connecter</button>
      </form>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      if (user) {
        localStorage.setItem('user', user);
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
